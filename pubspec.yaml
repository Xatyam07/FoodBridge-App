name: foodbridge
description: A Flutter project for FoodBridge app.
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.6.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # UI & responsive
  sizer: ^3.0.0+2
  flutter_svg: ^2.0.9
  google_fonts: ^6.1.0

  # Feature dependencies
  cached_network_image: ^3.3.1
  connectivity_plus: ^5.0.2
  dio: ^5.4.0
  fluttertoast: ^8.2.4
  fl_chart: ^0.66.0
  camera: ^0.10.5+9
  image_picker: ^1.0.7
  permission_handler: ^11.3.1
  image_cropper: ^8.0.2
  flutter_slidable: ^3.1.0
  google_maps_flutter: ^2.6.1
  geolocator: ^10.1.0
  universal_html: ^2.2.4
  local_auth: ^2.1.7
  shared_preferences: ^2.2.2

  # Firebase
  firebase_core: ^3.14.0
  firebase_auth: ^5.7.0
  cloud_firestore: ^5.5.0
  firebase_app_check: ^0.3.0+3
  google_sign_in: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.14.2

# Launcher icon configuration
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/foodbridge_logo.png"
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/images/foodbridge_logo.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/foodbridge_logo.png
