plugins {
    id "com.android.application"
    id "org.jetbrains.kotlin.android"

    // ✅ Flutter Gradle Plugin (must always come last)
    id "dev.flutter.flutter-gradle-plugin"

    // ✅ Firebase + Google Sign-In integration
    id "com.google.gms.google-services"

}

android {
    namespace "com.foodbridge.app"

    // ✅ Use SDK 36 (stable and required for new plugins)
    compileSdk 36

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
        coreLibraryDesugaringEnabled true
    }

    kotlinOptions {
        jvmTarget = "17"
    }

    defaultConfig {
        applicationId "com.foodbridge.app"

        // ✅ Compatible with local_auth, Firebase, and modern libraries
        minSdkVersion flutter.minSdkVersion
        targetSdkVersion 36

        versionCode 1
        versionName "1.0"

        multiDexEnabled true
    }

    buildTypes {
        release {
            minifyEnabled false
            shrinkResources false
            signingConfig signingConfigs.debug
        }
        debug {
            signingConfig signingConfigs.debug
        }
    }

    // ✅ Enable ViewBinding for cleaner UI code
    buildFeatures {
        viewBinding true
    }

    // ✅ Exclude duplicate META-INF entries to prevent packaging conflicts
    packagingOptions {
        resources {
            excludes += [
                    "META-INF/LICENSE",
                    "META-INF/LICENSE.txt",
                    "META-INF/NOTICE",
                    "META-INF/NOTICE.txt"
            ]
        }
    }
}

flutter {
    source '../..'
}

dependencies {
    // ✅ Desugaring for modern Java APIs (required by some Firebase libs)
    coreLibraryDesugaring "com.android.tools:desugar_jdk_libs:2.1.4"

    // ✅ MultiDex support for large Flutter/Firebase apps
    implementation "androidx.multidex:multidex:2.0.1"

    // ✅ Material Design Components
    implementation "com.google.android.material:material:1.12.0"

    // ✅ Firebase Authentication
    implementation platform('com.google.firebase:firebase-bom:33.3.0')
    implementation "com.google.firebase:firebase-auth"



    // ✅ Google Sign-In (Play Services)
    implementation "com.google.android.gms:play-services-auth:21.2.0"

    // ✅ Networking: Retrofit + OkHttp
    implementation "com.squareup.retrofit2:retrofit:2.9.0"
    implementation "com.squareup.retrofit2:converter-gson:2.9.0"
    implementation "com.squareup.okhttp3:okhttp:4.11.0"
    implementation "com.squareup.okhttp3:logging-interceptor:4.11.0"

    // ✅ Optional: Concurrent utilities for background tasks
    implementation "androidx.concurrent:concurrent-futures:1.1.0"
}
